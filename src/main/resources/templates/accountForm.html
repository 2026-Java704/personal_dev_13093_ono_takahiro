<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>会員登録</title>
<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
	<header>
		<h1>レシピサイト</h1>
	</header>
	<hr>
	<main>
		<h3>ユーザ情報</h3>
		<form action="/account" method="post">
			<div th:if="${errorList}">
				<div th:each="error:${errorList}" th:text="${error}"></div>
			</div>

			<table border="1">
			<tr>
				<th>お名前</th>
				<td>
					<input type="text" name="name" th:value="${name}">
				</td>
			</tr>
			<tr>
				<th>メールアドレス</th>
				<td>
					<input type="text" name="email" th:value="${email}">
				</td>
			</tr>
			<tr>
				<th>パスワード</th>
				<td>
					<input type="text" name="password">
				</td>
				<tr>
					<th>パスワード（確認用）</th>
					<td>
						<input type="text" name="passwordConfirm">
					</td>
				</tr>
			</tr>
		</table>
		<button>登録</button>
	</main>
	<hr>
</body>
</html>
