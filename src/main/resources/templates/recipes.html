<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>トップページ/レシピ一覧</title>
</head>
<body>
	<h1>トップページ</h1>
		
	<table border="1">
		<tr>
			<th>商品ID</th>
			<th>商品名</th>
			<th>値段</th>
			<th>更新</th>
		</tr>
		<tr th:each="recipe:${recipes}">
			<td th:text="${recipe.id}"></td>
			<td th:text="${recipe.name}"></td>
			<td th:text="${recipe.userId}"></td>
			<td>
				<form th:action="'/recipes/'+${recipe.id}+'/edit'" method="get">
					<input type="submit" value="更新">
				</form>
			</td>
		</tr>
	</table>
	
	<a href="/recipes/add">新規登録</a>
</body>
</html>
