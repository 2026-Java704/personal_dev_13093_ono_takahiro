<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>トップページ/レシピ一覧</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	<hr>
	<nav>
	<h1>CookGood!!</h1>
		<!--　新規登録ボタン-->
		<form action="/recipes/add" method="get">
			<input type="submit" value="新規登録">
			        </form>
		<!-- レシピの検索フォーム -->
		<form action="/recipes" method="get">
            <input type="text" name="keyword" placeholder="レシピ名で検索">
            <input type="submit" value="検索">
		<br>
		<!-- カテゴリー検索 -->
		<p>カテゴリ</p>
		<a href="/recipes" class="btn">全カテゴリ</a>
		<a th:each="category:${categories}"
	       th:href="@{/recipes(categoryId=${category.id})}"
	       th:text="${category.name}"
	       style="margin-right: 5px;"class="btn"></a>
		<br>
		<!-- レシピの一覧を表示(レシピ名にレシピ詳細のリンク) -->
		<p>レシピ一覧</p>
		<table border="1">
				<tr>
                <th>レシピ名</th>
                <th>作成者</th>
	            </tr>
				<tr th:each="recipe:${recipes}">
                	<td><a th:href="@{/recipes/detail(id=${recipe.id})}"
						th:text="${recipe.name}"></a></td>
               		<td th:text="${recipe.user.name}"></td>
            	</tr>
			</table>
	
</body>
</html>
